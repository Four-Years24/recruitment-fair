<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="'报名 - ' + ${fair.title}">企业报名</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <th:block th:replace="~{fragments/header :: header('fairs')}"></th:block>

    <div class="container mt-4" style="max-width:700px">
        <a href="/company/register" class="btn btn-outline-secondary btn-sm mb-3">&larr; 返回选择招聘会</a>

        <div class="alert alert-info">
            报名参加：<strong th:text="${fair.title}"></strong>
        </div>

        <form method="post" th:action="@{/company/register/{fairId}(fairId=${fair.id})}">
            <!-- 企业基本信息 -->
            <h5 class="mb-3">企业信息</h5>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">企业名称 *</label>
                    <input type="text" name="companyName" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">行业</label>
                    <input type="text" name="industry" class="form-control" placeholder="如：互联网">
                </div>
                <div class="col-md-3">
                    <label class="form-label">规模</label>
                    <select name="scale" class="form-select">
                        <option value="">请选择</option>
                        <option>1-49</option><option>50-99</option><option>100-499</option>
                        <option>500-999</option><option>1000+</option>
                    </select>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">企业性质</label>
                    <select name="nature" class="form-select">
                        <option value="">请选择</option>
                        <option>国企</option><option>私企</option><option>外企</option>
                        <option>合资</option><option>事业单位</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">公司地址</label>
                    <input type="text" name="address" class="form-control">
                </div>
            </div>

            <!-- 联系人信息 -->
            <h5 class="mb-3 mt-4">联系人</h5>
            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">姓名 *</label>
                    <input type="text" name="contactName" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">手机号 *</label>
                    <input type="text" name="contactPhone" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">邮箱</label>
                    <input type="email" name="contactEmail" class="form-control">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">企业简介</label>
                <textarea name="companyDescription" class="form-control" rows="2"></textarea>
            </div>

            <!-- 岗位信息 -->
            <h5 class="mb-3 mt-4">招聘岗位 <small class="text-muted">（至少填一个）</small></h5>
            <div th:each="i : ${#numbers.sequence(0, 2)}" class="card mb-3 bg-light">
                <div class="card-body">
                    <div class="row mb-2">
                        <div class="col-md-6">
                            <label class="form-label" th:text="'岗位名称' + (${i == 0} ? ' *' : '')"></label>
                            <input type="text" th:name="'positions[' + ${i} + '].title'" class="form-control"
                                   th:required="${i == 0}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">招聘人数</label>
                            <input type="number" th:name="'positions[' + ${i} + '].headcount'" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">学历要求</label>
                            <select th:name="'positions[' + ${i} + '].education'" class="form-select">
                                <option value="">不限</option>
                                <option>大专</option><option>本科</option><option>硕士</option><option>博士</option>
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4">
                            <label class="form-label">薪资范围</label>
                            <input type="text" th:name="'positions[' + ${i} + '].salaryRange'" class="form-control"
                                   placeholder="如：15K-25K">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">工作城市</label>
                            <input type="text" th:name="'positions[' + ${i} + '].workCity'" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">专业要求</label>
                            <input type="text" th:name="'positions[' + ${i} + '].majorRequire'" class="form-control">
                        </div>
                    </div>
                    <div class="mt-2">
                        <label class="form-label">岗位描述</label>
                        <textarea th:name="'positions[' + ${i} + '].description'" class="form-control" rows="1"></textarea>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100">提交报名</button>
        </form>
    </div>

    <div class="container mt-5"><hr><p class="text-center text-muted">Spring Boot + MyBatis + Thymeleaf</p></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
