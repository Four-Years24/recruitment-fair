<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>企业报名 - 校园招聘会</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <th:block th:replace="~{fragments/header :: header('register')}"></th:block>

    <div class="container mt-4">
        <div class="text-center mb-4">
            <h3>企业报名参加招聘会</h3>
            <p class="text-muted">请选择您要参加的招聘会场次</p>
        </div>

        <div th:if="${#lists.isEmpty(fairs)}" class="alert alert-info text-center">
            当前没有正在举办的招聘会，请关注后续通知。
        </div>

        <div class="row">
            <div class="col-md-6 mb-3" th:each="fair : ${fairs}">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${fair.title}"></h5>
                        <p class="text-muted">
                            <span th:text="${#temporals.format(fair.startTime, 'yyyy-MM-dd HH:mm')}"></span>
                            ~ <span th:text="${#temporals.format(fair.endTime, 'yyyy-MM-dd HH:mm')}"></span>
                        </p>
                        <p>地点: <span th:text="${fair.location}"></span></p>
                        <a th:href="@{/company/register/{id}(id=${fair.id})}"
                           class="btn btn-primary">立即报名</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block th:replace="~{fragments/footer :: footer}"></th:block>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
