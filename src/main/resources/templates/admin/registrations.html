<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>报名审核 - 管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <th:block th:replace="~{fragments/admin-header :: adminHeader('registrations')}"></th:block>
    <div class="container mt-4">
        <h3>报名审核</h3>

        <!-- 筛选表单 -->
        <form class="row g-3 mb-4" method="get" action="/admin/registrations">
            <div class="col-auto">
                <input type="text" name="companyName" class="form-control" placeholder="企业名称"
                       th:value="${dto?.companyName}">
            </div>
            <div class="col-auto">
                <select name="status" class="form-select">
                    <option value="">全部状态</option>
                    <option value="0" th:selected="${dto?.status == 0}">待审核</option>
                    <option value="1" th:selected="${dto?.status == 1}">已通过</option>
                    <option value="2" th:selected="${dto?.status == 2}">已驳回</option>
                </select>
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-outline-primary">筛选</button>
            </div>
        </form>

        <table class="table table-striped table-hover">
            <thead><tr><th>ID</th><th>企业</th><th>招聘会</th><th>联系人</th><th>电话</th><th>状态</th><th>提交时间</th><th>操作</th></tr></thead>
            <tbody>
                <tr th:each="r : ${page.list}">
                    <td th:text="${r.id}"></td>
                    <td th:text="${r.companyName}"></td>
                    <td th:text="${r.jobFairTitle}"></td>
                    <td th:text="${r.contactName}"></td>
                    <td th:text="${r.contactPhone}"></td>
                    <td>
                        <span class="badge" th:classappend="${r.status == 1} ? 'bg-success' : (${r.status == 2} ? 'bg-danger' : 'bg-warning')"
                              th:text="${r.status == 1} ? '已通过' : (${r.status == 2} ? '已驳回' : '待审核')"></span>
                    </td>
                    <td th:text="${#temporals.format(r.createTime, 'MM-dd HH:mm')}"></td>
                    <td>
                        <a class="btn btn-outline-primary btn-sm" th:href="@{/admin/registrations/{id}(id=${r.id})}">查看</a>
                    </td>
                </tr>
            </tbody>
        </table>

        <p class="text-muted">共 <span th:text="${page.total}"></span> 条记录，
           第 <span th:text="${page.pageNum}"></span>/<span th:text="${page.totalPages}"></span> 页</p>
    </div>
    <div class="container mt-5"><hr><p class="text-center text-muted">Spring Boot + MyBatis + Thymeleaf</p></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
