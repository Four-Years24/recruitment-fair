<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>招聘会管理 - 管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <th:block th:replace="~{fragments/admin-header :: adminHeader('jobFairs')}"></th:block>
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>招聘会管理</h3>
            <a href="/admin/job-fairs/new" class="btn btn-primary">新建招聘会</a>
        </div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <table class="table table-striped table-hover">
            <thead><tr><th>ID</th><th>名称</th><th>时间</th><th>地点</th><th>状态</th></tr></thead>
            <tbody>
                <tr th:each="f : ${fairs}">
                    <td th:text="${f.id}"></td>
                    <td th:text="${f.title}"></td>
                    <td>
                        <span th:text="${#temporals.format(f.startTime, 'MM-dd HH:mm')}"></span>
                        ~ <span th:text="${#temporals.format(f.endTime, 'MM-dd HH:mm')}"></span>
                    </td>
                    <td th:text="${f.location}"></td>
                    <td>
                        <span class="badge" th:classappend="${f.status == 1} ? 'bg-success' : (${f.status == 2} ? 'bg-secondary' : 'bg-warning')"
                              th:text="${f.status == 1} ? '已发布' : (${f.status == 2} ? '已结束' : '草稿')"></span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <div class="container mt-5"><hr><p class="text-center text-muted">Spring Boot + MyBatis + Thymeleaf</p></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
