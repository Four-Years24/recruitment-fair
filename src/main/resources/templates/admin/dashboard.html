<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>工作台 - 管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <th:block th:replace="~{fragments/admin-header :: adminHeader('dashboard')}"></th:block>
    <div class="container mt-4">
        <h3 class="mb-4">工作台</h3>

        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card border-primary">
                    <div class="card-body text-center">
                        <div class="text-primary display-6 fw-bold" th:text="${#lists.size(fairs)}">0</div>
                        <div class="text-muted">招聘会总数</div>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div class="card">
                    <div class="card-body text-center">
                        <h5 class="card-title">快捷操作</h5>
                        <a href="/admin/job-fairs/new" class="btn btn-primary btn-sm me-2">新建招聘会</a>
                        <a href="/admin/registrations" class="btn btn-outline-primary btn-sm">查看报名</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <th:block th:replace="~{fragments/footer :: footer}"></th:block>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
