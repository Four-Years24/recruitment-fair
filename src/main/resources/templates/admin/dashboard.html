<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作台 - 管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <th:block th:replace="~{fragments/admin-header :: adminHeader('dashboard')}"></th:block>
    <div class="container mt-4">
        <h3>工作台</h3>
        <div class="row mt-4">
            <div class="col-md-4 mb-3">
                <div class="card text-bg-primary">
                    <div class="card-body">
                        <h5 class="card-title">招聘会数量</h5>
                        <p class="display-6" th:text="${#lists.size(fairs)}">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card text-bg-success">
                    <div class="card-body">
                        <h5 class="card-title">快捷操作</h5>
                        <a href="/admin/job-fairs/new" class="btn btn-light btn-sm">新建招聘会</a>
                        <a href="/admin/registrations" class="btn btn-light btn-sm mt-1">查看报名</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="container mt-5"><hr><p class="text-center text-muted">Spring Boot + MyBatis + Thymeleaf</p></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
