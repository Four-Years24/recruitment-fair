<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园招聘会管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <th:block th:replace="~{fragments/header :: header('fairs')}"></th:block>

    <div class="container mt-4">
        <h2 class="mb-4">招聘会列表</h2>

        <!-- 没有招聘会时 -->
        <div th:if="${fairs.isEmpty()}" class="alert alert-info">
            暂无招聘会信息，请关注后续通知。
        </div>

        <!-- 招聘会卡片列表 -->
        <div class="row">
            <div class="col-md-6 mb-3" th:each="fair : ${fairs}">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${fair.title}">招聘会名称</h5>
                        <p class="card-text text-muted">
                            时间: <span th:text="${#temporals.format(fair.startTime, 'yyyy-MM-dd HH:mm')}"></span>
                            ~ <span th:text="${#temporals.format(fair.endTime, 'yyyy-MM-dd HH:mm')}"></span>
                        </p>
                        <p class="card-text">
                            地点: <span th:text="${fair.location}">地点</span>
                        </p>
                        <a class="btn btn-outline-primary btn-sm" th:href="@{/fairs/{id}(id=${fair.id})}">
                            查看详情
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container mt-5">
        <hr>
        <p class="text-center text-muted">Spring Boot + MyBatis + Thymeleaf</p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
