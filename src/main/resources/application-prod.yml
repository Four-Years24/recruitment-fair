# 生产环境 — 敏感信息用环境变量
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/recruitment_fair}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}

mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl  # 生产不打印 SQL

logging:
  level:
    com.recruitment: warn  # 生产只记录警告和错误
